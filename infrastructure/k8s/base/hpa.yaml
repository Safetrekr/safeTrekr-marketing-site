# ST-792: REQ-009 - Kubernetes Manifests for SafeTrekr Marketing Site
#
# HorizontalPodAutoscaler scales the Deployment between 2 and 4 replicas.
#
# Thresholds are aligned with the DOKS cluster autoscaler triggers defined in
# cluster-spec.md Section 3.1:
# - CPU target 70% matches the cluster scale-up trigger
# - Memory target 80% matches the cluster memory scale-up trigger
#
# The scaleDown stabilization window (300s) prevents thrashing during
# short traffic bursts.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safetrekr-web
  labels:
    app.kubernetes.io/name: safetrekr-web
    app.kubernetes.io/part-of: safetrekr-marketing
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safetrekr-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
