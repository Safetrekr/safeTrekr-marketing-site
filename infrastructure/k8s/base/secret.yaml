# ST-792: REQ-009 - Kubernetes Manifests for SafeTrekr Marketing Site
#
# Secret TEMPLATE -- DO NOT commit real credentials to version control.
#
# This file exists as a structural reference for the required secret keys.
# In production, secrets are managed via Sealed Secrets (REQ-097) or injected
# by CI/CD. The base64 values below are the literal string "REPLACE_ME".
#
# To generate a real base64 value:
#   echo -n "your-actual-key" | base64
---
apiVersion: v1
kind: Secret
metadata:
  name: safetrekr-web-secrets
  labels:
    app.kubernetes.io/name: safetrekr-web
    app.kubernetes.io/part-of: safetrekr-marketing
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kustomize
type: Opaque
data:
  # echo -n "REPLACE_ME" | base64 = UkVQTEFDRV9NRQ==
  SUPABASE_SERVICE_ROLE_KEY: "UkVQTEFDRV9NRQ=="
  SENDGRID_API_KEY: "UkVQTEFDRV9NRQ=="
