# ST-792: REQ-009 - Kubernetes Manifests for SafeTrekr Marketing Site
#
# ServiceAccount for the safetrekr-web application pods.
# automountServiceAccountToken is disabled per cluster security policy
# (see cluster-spec.md Section 8.1) -- pods do not need Kubernetes API access.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: safetrekr-web
  labels:
    app.kubernetes.io/name: safetrekr-web
    app.kubernetes.io/part-of: safetrekr-marketing
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kustomize
automountServiceAccountToken: false
