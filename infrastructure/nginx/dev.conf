# ST-789: REQ-006 - Nginx Reverse Proxy for Local Development
#
# Simulates a production-like reverse proxy in front of the Next.js app.
# Accessible at http://localhost:8080 when the "with-nginx" profile is active:
#
#   docker compose --profile with-nginx up
#
# This configuration mirrors common production patterns:
#   - Reverse proxy to the Next.js upstream
#   - Security headers (CSP, X-Frame-Options, etc.)
#   - Gzip compression for text-based assets
#   - Static asset caching headers
#   - WebSocket upgrade support for HMR in dev mode

upstream nextjs {
    server web:3000;
}

server {
    listen 80;
    server_name localhost;

    # -----------------------------------------------------------------------
    # Gzip compression
    # -----------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # -----------------------------------------------------------------------
    # Next.js static assets -- long cache, immutable
    # -----------------------------------------------------------------------
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # -----------------------------------------------------------------------
    # Public static files
    # -----------------------------------------------------------------------
    location /public/ {
        proxy_pass http://nextjs;
        add_header Cache-Control "public, max-age=3600";
    }

    # -----------------------------------------------------------------------
    # WebSocket support (required for Next.js HMR / Turbopack in dev)
    # -----------------------------------------------------------------------
    location /_next/webpack-hmr {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # -----------------------------------------------------------------------
    # Default: proxy everything else to Next.js
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
