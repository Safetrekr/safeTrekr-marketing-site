apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: <SERVICE_NAME>
  namespace: dev
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '20m'
    nginx.ingress.kubernetes.io/ssl-redirect: 'false'
    nginx.ingress.kubernetes.io/limit-connections: '30'
    nginx.ingress.kubernetes.io/limit-rps: '70'
spec:
  ingressClassName: nginx
  rules:
    - host: dev-safetrekr-www.tarva.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: <SERVICE_NAME>
                port:
                  number: 3000
  tls:
    - hosts:
        - dev-safetrekr-www.tarva.network
      secretName: cloudflare-origin-tls-tarva
