# ST-789: REQ-006 - Local Development Overrides
#
# This file is auto-loaded by `docker compose up` alongside docker-compose.yml.
# It overrides the production config with dev-friendly settings:
#   - Stops the build at the deps stage (faster rebuilds, no full production build)
#   - Runs `npm run dev` with Turbopack instead of the standalone server
#   - Bind-mounts src/ and public/ for hot-reload without rebuilding
#
# To run with the optional Nginx reverse proxy:
#   docker compose --profile with-nginx up
#
# To skip this file and run production mode only:
#   docker compose -f docker-compose.yml up

services:
  web:
    build:
      target: deps  # Stop at deps stage for faster rebuilds
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src:ro
      - ./public:/app/public:ro
    environment:
      - NODE_ENV=development

  # Optional Nginx reverse proxy for testing production-like setup
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    profiles:
      - with-nginx
