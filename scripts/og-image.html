<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --secondary: #123646;
    --secondary-light: #1a4a5e;
    --primary-400: #6cbc8b;
    --primary-500: #4ca46e;
    --primary-700: #33704b;
    --light: #f7f8f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #0e2a37 0%, #123646 45%, #1a4a5e 100%);
    color: var(--light);
    position: relative;
    overflow: hidden;
  }
  /* Soft dot-grid texture */
  .grid {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(108,188,139,0.10) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.6;
  }
  /* Bottom accent bar */
  .accent {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 10px;
    background: linear-gradient(90deg, var(--primary-700) 0%, var(--primary-500) 50%, var(--primary-400) 100%);
  }
  .frame {
    position: relative;
    height: 100%;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .top {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .logo {
    height: 72px;
    width: auto;
    display: block;
  }
  .content {
    max-width: 960px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(108,188,139,0.14);
    border: 1px solid rgba(108,188,139,0.35);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--primary-400);
    margin-bottom: 28px;
  }
  .eyebrow .dot {
    width: 8px; height: 8px; border-radius: 999px;
    background: var(--primary-400);
    box-shadow: 0 0 12px rgba(108,188,139,0.8);
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-size: 108px;
    line-height: 1.02;
    letter-spacing: -0.02em;
    color: var(--light);
  }
  h1 .accent-word {
    color: var(--primary-400);
    font-style: italic;
  }
  .bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .tag {
    font-size: 22px;
    font-weight: 500;
    color: rgba(247,248,248,0.72);
    max-width: 640px;
    line-height: 1.45;
  }
  .url {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--primary-400);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="frame">
    <div class="top">
      <img class="logo" src="/images/Safetrekr-horizontal-logo-light.svg" alt="SafeTrekr" />
    </div>

    <div class="content">
      <div class="eyebrow"><span class="dot"></span>Trip Safety Planning Platform</div>
      <h1>Every trip<br/>requires <span class="accent-word">a plan</span>.</h1>
    </div>

    <div class="bottom">
      <div class="tag">Professional analyst review. Clear documentation. Mobile field support.</div>
      <div class="url">safetrekr.com</div>
    </div>
  </div>
  <div class="accent"></div>
</body>
</html>
